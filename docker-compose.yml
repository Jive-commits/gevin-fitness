# Local Postgres for development. Mirrors the Railway-managed Postgres plugin.
# Usage: docker compose up -d  →  DATABASE_URL=postgresql://forge:forge@localhost:5432/forge
services:
  db:
    image: postgres:16-alpine
    container_name: forge-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forge
    ports:
      - '5432:5432'
    volumes:
      - forge-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U forge -d forge']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  forge-pgdata:
